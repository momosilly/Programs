{% extends "base.html" %}
{% block title %}Inloggen{% endblock %}

{% block content %}
<div style="max-width: 380px; margin: 80px auto;">
  <div class="card">
    <h1 style="text-align:center; margin-bottom: 8px;">Inloggen</h1>
    <p style="text-align:center; color:#666; font-size:.9rem; margin-bottom:24px;">
      Voer je RFID UID in om in te loggen
    </p>

    <form method="POST" action="/login">
      <label style="font-size:.85rem; font-weight:600; display:block; margin-bottom:6px;">UID</label>
      <input type="text" name="uid" placeholder="bijv. A3F2C109" autofocus>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:16px; padding:10px;">
        Inloggen
      </button>
    </form>
  </div>
</div>
{% endblock %}
